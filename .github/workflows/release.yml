name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Build Windows binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $env:GOCACHE = Join-Path $env:GITHUB_WORKSPACE ".gocache"
          go build -mod=vendor -o dist/mariadb-installer.exe .

      - name: Verify release asset
        shell: pwsh
        run: |
          if (-not (Test-Path dist/mariadb-installer.exe)) {
            throw "dist/mariadb-installer.exe was not created"
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mariadb-installer.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true
